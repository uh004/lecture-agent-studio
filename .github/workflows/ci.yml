name: CI (Cost-Free)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install System Dependencies (LibreOffice, Poppler, FFmpeg)
      run: |
        sudo apt-get update
        sudo apt-get install -y libreoffice poppler-utils ffmpeg

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Verify Environment
      run: |
        echo "✅ Python 3.11 environment is ready!"
        echo "✅ System dependencies installed!"
        echo "✅ Python libraries installed successfully!"
        echo "🚀 Skipping actual Jupyter Notebook execution to prevent OpenAI & Tavily API costs."
